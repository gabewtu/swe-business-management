<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-layout">
        <div class="sidebar">
            <h2>Customer Menu</h2>

            <button type="button" class="menu-button" onclick="showDashboardSection('customerHomeSection')">
                Home
            </button>

            <button type="button" class="menu-button" onclick="loadAndShowCustomer('myAppointmentsSection', loadMyAppointments)">
                My Appointments
            </button>

            <button type="button" class="menu-button" onclick="loadAndShowCustomer('customerInvoicesSection', loadMyInvoices)">
                My Invoices
            </button>

            <button type="button" class="menu-button" onclick="goHome()">
                Log Out
            </button>
        </div>

        <div class="dashboard-content">
            <div id="customerHomeSection" class="dashboard-section">
                <h1 id="customerWelcomeMessage">Hi there!</h1>
                <p>Use the menu on the left to view your appointments.</p>
            </div>

            <div id="myAppointmentsSection" class="dashboard-section" style="display: none;">
                <h1>My Appointments</h1>
                <p>All of your scheduled and completed appointments.</p>
                <div id="myAppointmentsTableContainer"><p>Loading...</p></div>
            </div>

            <div id="customerInvoicesSection" class="dashboard-section" style="display: none;">
                <h1>My Invoices</h1>
                <p>View your past and current invoices.</p>

                <div id="customerInvoicesContainer">
                    <p>Loading invoices...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
